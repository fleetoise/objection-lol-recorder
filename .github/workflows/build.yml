name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: '1.0.0'
      prerelease:
        description: 'Is this a prerelease?'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version number
        run: |
          CURRENT_VERSION=$(npm run version --silent)
          TARGET_VERSION="${{ github.event.inputs.version }}"
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            npm run set-version $TARGET_VERSION
          fi
        shell: bash

      - name: Build Windows app
        run: npm run make

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: out/make/**/x64/*

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system packages required for AppImage
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 fakeroot rpm dpkg xz-utils cpio

      - name: Install dependencies
        run: npm ci

      - name: Set version number
        run: |
          CURRENT_VERSION=$(npm run version --silent)
          TARGET_VERSION="${{ github.event.inputs.version }}"
          if [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            npm run set-version $TARGET_VERSION
          fi
        shell: bash

      - name: Build Vite output
        run: npm run package   # or your actual vite build command

      - name: Build Linux AppImage (electron-builder)
        run: npx electron-builder --linux AppImage --x64 --publish never

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*.AppImage
